services:
    app:
        build:
            context: .
            dockerfile: Dockerfile
        restart: always
        ports:
            - '8082:80'
        environment:
            APP_NAME: ${APP_NAME:-InventoryApp}
            APP_ENV: ${APP_ENV:-production}
            APP_KEY: ${APP_KEY}
            APP_DEBUG: ${APP_DEBUG:-false}
            APP_URL: ${APP_URL:-https://ga.interprima.co.id}
            DB_CONNECTION: mysql
            DB_HOST: mysql
            DB_PORT: 3306
            DB_DATABASE: ${DB_DATABASE}
            DB_USERNAME: ${DB_USERNAME}
            DB_PASSWORD: ${DB_PASSWORD}
        volumes:
            - inventory_app_app_storage:/app/storage
        depends_on:
            - mysql

    mysql:
        image: 'mysql:8.4'
        restart: always
        ports:
            - '3307:3306'
        environment:
            MYSQL_ROOT_PASSWORD: '${DB_PASSWORD}'
            MYSQL_DATABASE: '${DB_DATABASE}'
            MYSQL_USER: '${DB_USERNAME}'
            MYSQL_PASSWORD: '${DB_PASSWORD}'
        volumes:
            - inventory_app_mysql_data:/var/lib/mysql
        healthcheck:
            test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
            retries: 3
            timeout: 5s

volumes:
    inventory_app_app_storage:
    inventory_app_mysql_data:
